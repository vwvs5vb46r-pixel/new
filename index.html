<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소수의견 영향력 연구</title>

  <!-- ── jsPsych 코어 ─────────────────────────────────────── -->
  <script src="lib/jspsych.min.js"></script>
  <link  href="lib/jspsych.css" rel="stylesheet">

  <!-- ── 반응형 플러그인 ───────────────────────────────────── -->
  <script src="lib/plugin-html-button-response.min.js"></script>
  <script src="lib/plugin-html-keyboard-response.min.js"></script>
  <script src="lib/plugin-html-slider-response.min.js"></script>

  <!-- ── 서베이 플러그인 ────────────────────────────────────── -->
  <script src="lib/plugin-survey-multi-choice.min.js"></script>
  <script src="lib/plugin-survey-text.min.js"></script>
  <script src="lib/plugin-survey-likert.min.js"></script>
  <script src="lib/plugin-survey-html-form.min.js"></script>

  <style>
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'NanumGothic', sans-serif;
    }
    .jspsych-content-wrapper { max-width: 820px; }
    .jspsych-content { padding: 20px 36px; }

    .exp-body  { text-align: left; line-height: 1.9; }
    .topic-title { font-size: 1.1em; font-weight: bold; margin-bottom: 0.5em; }
    .topic-desc  { font-size: 0.93em; color: #333; line-height: 1.8; margin-bottom: 1em; text-align: left; }
    .note        { font-size: 0.83em; color: #777; }
    hr.soft      { border: none; border-top: 1px solid #e8e8e8; margin: 18px 0; }

    .jspsych-html-slider-response-container { padding: 30px 0 10px; }
    .jspsych-slider { cursor: pointer; }

    /* 네이티브 슬라이더 값 표시 */
    .slider-value-display {
      text-align: match-parent;
      font-size: 1.15em;
      font-weight: bold;
      color: #2c7be5;
      margin-top: 20px;
    }

    /* 인라인 폼용 슬라이더 행 */
    .inline-slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }
    .inline-slider-row input[type=range] { flex: 1; cursor: pointer; }
    .inline-slider-val {
      min-width: 38px;
      text-align: center;
      font-size: 1.1em;
      font-weight: bold;
      color: #2c7be5;
    }

    /* 인라인 폼 섹션 */
    .form-section { margin-bottom: 28px; }
    .form-section p { margin-bottom: 8px; }
    .form-section textarea { width: 100%; box-sizing: border-box; }
    .form-radio-row label { margin-right: 20px; cursor: pointer; }

    .stop-wrap {
      max-width: 460px; margin: 50px auto; padding: 36px 28px;
      background: #fff8e1; border: 2px solid #ffc107; border-radius: 12px;
      text-align: center;
    }
    .stop-wrap .icon { font-size: 2.4em; margin-bottom: 10px; }
    .stop-wrap .hint { font-size: 0.78em; color: #bbb; margin-top: 16px; }

    .majority-wrap {
      max-width: 460px; margin: 30px auto; padding: 28px 24px;
      background: #e8f4fd; border: 2px solid #2c7be5; border-radius: 12px;
      text-align: center;
    }
    .majority-wrap h2 { color: #2c7be5; font-size: 1.5em; margin: 10px 0; }
    .majority-wrap .pct { font-size: 1.1em; font-weight: bold; }

    .minority-box {
      background: #f7f7f7; border-left: 5px solid #888;
      padding: 20px 22px; margin: 18px 0; border-radius: 0 8px 8px 0;
      text-align: left; line-height: 1.85; font-size: 0.94em;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 42px; height: 42px; margin: 22px auto;
      border: 5px solid #ddd; border-top-color: #2c7be5;
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }

    .bipolar-table { width: 100%; border-collapse: collapse; font-size: 0.86em; }
    .bipolar-table th   { color: #666; font-weight: 400; padding: 4px 2px; text-align: center; }
    .bipolar-table td   { padding: 9px 3px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    .bipolar-table .lbl-l { text-align: right; padding-right: 10px; width: 36%; }
    .bipolar-table .lbl-r { text-align: left;  padding-left:  10px; width: 36%; }
    .bipolar-table .rc    { text-align: center; width: 4%; }
    .bipolar-table input[type=radio] { width: 15px; height: 15px; cursor: pointer; }

    .jspsych-survey-likert-statement { font-size: 0.92em; }
    .jspsych-survey-multi-choice-question { font-size: 1em; }
  </style>
</head>
<body>
<script>
"use strict";

/* ================================================================
   ① jsPsych 초기화
   ================================================================ */
const jsPsych = initJsPsych({
  /* 매 시행 완료 후 localStorage에 자동 저장 */
  on_data_update() {
    try {
      localStorage.setItem(
        `jspsych_autosave_${pID || 'unknown'}`,
        jsPsych.data.get().csv()
      );
    } catch(e) {}
  },
  on_finish() {
    jsPsych.data.get().localSave(
      'csv', `data_${pID || 'unknown'}_${Date.now()}.csv`
    );
  }
});

/* ================================================================
   ② 전역 상태 변수
   ================================================================ */
const COND = jsPsych.randomization.sampleWithoutReplacement(
  ['AI', 'Human', 'REAL_AI'], 1
)[0];

let pID         = '';
let firstChoice = null;
let firstReason = '';
let aiUsed      = false;

jsPsych.data.addProperties({ condition: COND });

/* ================================================================
   ③ 헬퍼 함수
   ================================================================ */

function stop(msg = '연구자의 지시가 있기 전까지 잠시 대기해주십시오') {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="stop-wrap">
        <div class="icon">⏸</div>
        <p><strong>${msg}</strong></p>
        <p class="hint">※ 실험자: <kbd>Space</kbd> 를 눌러 계속하세요</p>
      </div>`,
    choices: [' '],
    post_trial_gap: 300
  };
}

/* ================================================================
   ④ 블록 정의
   ================================================================ */

/* ── 블록 1 │ indirect topic – pre ── */
const PRE_TOPICS = [
  {
    id: 'tuition',
    title: '대학교 등록금 인상',
    desc: `최근 대학교 등록금 인상에 대해 다양한 의견이 존재합니다.<br><br>
      학생 복지 향상과 우수 교원 충원 등 필수적인 재정 확보를 위해 어느 정도의 인상은
      불가피하다는 찬성 의견도 있지만, 학생들의 경제적 부담을 가중시키며 인상의 근거가
      불명확하다고 비판하는 반대 의견도 제시됩니다.`
  },
  {
    id: 'lecture_rec',
    title: '강의 녹화본 제공 의무화',
    desc: `대학 내 모든 강의의 녹화본 제공 의무화에 대해 다양한 의견이 존재합니다.<br><br>
      학생들의 학습권 보장과 복습 편의를 위해 꼭 필요하다는 찬성 의견이 있기도 하지만,
      대면 수업의 출석률과 참여도 하락을 우려하는 반대 입장도 존재합니다.`
  },
  {
    id: 'abs_grade',
    title: '절대평가 전환',
    desc: `대학 내 성적 평가 방식을 절대평가로 전환하는 것에 대해 다양한 의견이 존재합니다.<br><br>
      학생들 간의 소모적인 경쟁을 완화하고 순수 학업 성취도를 평가하기 위해 필요하다는
      찬성 입장도 있지만, 학점 인플레이션으로 인해 대학 성적의 객관성과 신뢰도가 저하될
      수 있다는 반대 입장도 존재합니다.`
  }
];

function topicSlider(t, prefix) {
  return {
    type: jsPsychHtmlSliderResponse,
    stimulus: `
      <div class="topic-title">${t.title}</div>
      <div class="topic-desc">${t.desc}</div>
      <p>귀하는 '${t.title}'에 대해 어떻게 생각하십니까?
      아래 슬라이더를 드래그하여 표시해 주십시오.<br>
      <span class="note">왼쪽으로 갈수록 매우 반대, 오른쪽으로 갈수록 매우 찬성에 해당합니다.</span></p>`,
    labels        : ['반대', '중립', '찬성'],
    min: 0, max: 100, slider_start: 50,
    require_movement: true,
    button_label  : '다음',
    on_load() {
      const slider = document.querySelector('input[type="range"]');
      const display = document.createElement('div');
      display.className = 'slider-value-display';
      display.textContent = slider.value;
      slider.parentNode.appendChild(display);
      slider.addEventListener('input', () => { display.textContent = slider.value; });
    },
    on_finish(d) {
      jsPsych.data.addProperties({ [`${prefix}_${t.id}`]: d.response });
    }
  };
}

const BLK_pretopic = [
  {
    type: jsPsychHtmlButtonResponse,
    stimulus: `<div class="exp-body">
      <h3>안녕하세요.</h3>
      <p>실험에 참여해주셔서 감사합니다.</p>
      <p>본격적인 시작에 앞서, 본 실험과 관련된 주제에 대한 <strong>연습 질문</strong>을 준비하였습니다.</p>
      <p>'다음'을 눌러 제시되는 3가지 주제에 대한 본인의 의견을 응답해 주십시오.</p>
    </div>`,
    choices: ['다음']
  },
  ...PRE_TOPICS.map(t => topicSlider(t, 'pre')),
  {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<p>감사합니다.</p><p>\'다음\'을 한 번 눌러 실험자의 지시를 기다려 주십시오.</p>',
    choices: ['다음']
  },
  {
    type: jsPsychSurveyText,
    questions: [{
      prompt  : '귀하의 <strong>ID</strong>를 작성해 주십시오. <span class="note">(예: X1234)</span>',
      name    : 'participant_id',
      required: true,
      columns : 15
    }],
    button_label: '다음',
    on_finish(d) {
      pID = d.response.participant_id;
      jsPsych.data.addProperties({ participant_id: pID });
    }
  },
  stop()
];

/* ── 블록 2 │ 연구 설명 + 동의서 + 팀명 ── */
const BLK_intro = [
  {
    type: jsPsychHtmlButtonResponse,
    stimulus: `<div class="exp-body">
      <h2>INTRODUCTION</h2>
      <p>안녕하세요.</p>
      <p>본 연구는 개인의 의사결정과 관련한 연구로, 여러분은 약 60분에 걸쳐 특정 주제에 대한
      의견과 짧은 글을 작성하는 일련의 과제에 참여하게 됩니다.</p>
      <p>본 실험은 크게 <strong>세 부분</strong>으로 구성됩니다.</p>
      <ul>
        <li>첫 번째: 특정 주제에 대한 찬반 의견 및 근거를 작성하는 <strong>의견 글쓰기 과제</strong></li>
        <li>두 번째: 같은 세션 팀원들과 진행하는 <strong>팀 토론</strong></li>
        <li>세 번째: <strong>사후 설문조사</strong> 응답</li>
      </ul>
      <p>설문조사에는 <strong>주의력 점검 문항</strong>이 포함되어 있으므로 모든 문항을 꼼꼼히 읽고
      신중하고 솔직하게 답변해 주시기 바랍니다.</p>
      <p>참여에 대한 보상은 <strong>수업 크레딧</strong>으로 지급될 예정입니다.</p>
      <hr class="soft">
      <p class="note">이지민 | 고려대학교 심리학부 산업및조직심리 석사과정 | jimin823@korea.ac.kr</p>
    </div>`,
    choices: ['다음']
  },
  {
    type: jsPsychSurveyMultiChoice,
    questions: [{
      prompt: `<div style="text-align:left;background:#f9f9f9;padding:18px;border-radius:6px;font-size:0.93em;line-height:1.8;">
        <strong>연구 참여 동의서</strong><br><br>
        저는 본 연구 참여가 자발적임을 이해합니다. 참여를 거부하더라도 어떠한 불이익도 발생하지 않습니다.
        또한 언제든지 참여를 중단할 수 있으며, 이로 인한 어떠한 불이익이나 누적된 혜택의 상실은 없습니다.<br><br>
        본인이 고려대학교 소속인 경우 연구 참여 여부, 거부 또는 철회 등 본 연구와 관련된 모든 결정이
        고려대학교에서의 지위 및 향후 관계에 어떠한 불이익도 미치지 않음을 이해합니다.<br><br>
        보상은 완료된 연구 참여량에 비례하여 지급됩니다.<br><br>
        본인이 <strong>만 18세 이상</strong>임을 확인합니다.<br><br>
        <hr class="soft">
        저는 이 동의서의 내용을 읽고 충분히 이해하였으며, 고려대학교 산업 및 조직심리 연구실에서
        저의 개인 데이터를 수집·이용·공개하는 것에 동의합니다.
      </div>`,
      name   : 'consent',
      options: ['동의합니다.', '동의하지 않습니다.'],
      required: true

    button_label: '다음',
    on_finish(d) {
      jsPsych.data.addProperties({ consent: d.response.consent });
      if (d.response.consent === '동의하지 않습니다.') {
        jsPsych.getDisplayElement().innerHTML =
          '<p style="text-align:center;padding:80px;">연구 참여에 동의하지 않으셨습니다.<br>창을 닫으셔도 됩니다.</p>';
        jsPsych.endExperiment();
      }
    }
  },
  stop(),
  {
    type: jsPsychHtmlButtonResponse,
    stimulus: `<div class="exp-body">
      <p>본격적으로 실험을 시작하기 전 모두 중앙으로 모여주십시오.</p>
      <p>이 실험의 중반에서는 같은 세션에 참석한 분들이 <strong>한 팀</strong>이 되어
      관련 주제에 대한 팀 토론이 진행될 예정입니다.</p>
      <p>모여 가볍게 인사를 나누고, 자유롭게 <strong>팀명</strong>을 정해주십시오.</p>
    </div>`,
    choices: ['팀명을 정했습니다']
  },
  {
    type: jsPsychSurveyText,
    questions: [{
      prompt: '팀명을 아래에 적어주십시오.',
      name  : 'team_name',
      required: true
    }],
    button_label: '다음',
    on_finish(d) {
      jsPsych.data.addProperties({ team_name: d.response.team_name });
    }
  },
  stop()
];

/* ── 블록 3 │ 신문기사 + 요약 (한 화면) ── */
const BLK_main = [
  {
    type: jsPsychSurveyHtmlForm,
    preamble: `<div class="exp-body">
      <p>하단에는 고려대학교 교내신문 중 일부가 제시되어 있습니다.</p>

      <p class="note">잘 보이지 않는 분들은 화면을 확대해 보실 수 있습니다. 제한 시간은 5분입니다.</p>
      <hr class="soft">
      <!--  ▲▲▲ 기사문 삽입 ▲▲▲  -->
      <img src="jspsych/examples/img/article.png" style="max-width:100%;">
      <!--  ▲▲▲ 삽입 끝 ▲▲▲  -->
      <hr class="soft">
    </div>`,
    html: `
      <div class="form-section">
        <p><strong>위의 신문기사를 요약해 주십시오.</strong> <span class="note">(양식 자유)</span></p>
        <textarea name="article_summary" rows="8" required></textarea>
      </div>
    `,
    button_label: '다음',
    on_finish(d) {

    }
  },
  stop()
];

/* ── 블록 4 │ first opinion (한 화면) ── */
const BLK_first = [
  {
    type: jsPsychSurveyHtmlForm,
    preamble: `<div class="exp-body">

    </div>`,
    html: `
      <div class="form-section">
        <p><strong>1. 신문기사에 제시된 주제에 대해 찬성하십니까, 반대하십니까?</strong></p>

          <label><input type="radio" name="first_choice" value="찬성" required> 찬성</label>

      </div>

      <div class="form-section">

        <div class="inline-slider-row">
          <span>약함</span>
          <input type="range" name="first_intensity" min="0" max="100" value="50"
            oninput="document.getElementById('fi_val').textContent = this.value">

          <span class="inline-slider-val" id="fi_val">50</span>

      </div>

      <div class="form-section">
        <p><strong>3. 그 이유는 무엇입니까?</strong> 본인의 생각과 근거를 최대한 자세히 작성해 주십시오.
        <strong>최소 7문장 이상, 2~3가지의 논거를 제시하여 주십시오.</strong></p>
        <p class="note">※ 작성하신 내용은 팀 토론 과정에서 다른 팀원들에게 공유될 예정입니다.</p>
        <textarea name="first_reason" rows="10" required></textarea>
      </div>

      <div class="form-section">
        <p><strong>4. 위 결정에 대한 본인의 자신감을 평가해 주십시오.</strong></p>
        <div class="inline-slider-row">
          <span>매우<br>자신없음</span>
          <input type="range" name="first_confidence" min="0" max="100" value="50"

          <span>매우<br>자신있음</span>
          <span class="inline-slider-val" id="fc_val">50</span>
        </div>

    button_label: '다음',
    on_finish(d) {
      firstChoice = d.response.first_choice;

        first_choice     : d.response.first_choice,

        first_reason     : d.response.first_reason,
        first_confidence : d.response.first_confidence
      });
    }
  },
  stop()
];

/* ── 블록 5 │ 분석 중 로딩 ── */
const TRIAL_loading = {
  type: jsPsychHtmlKeyboardResponse,

function buildNarcTable() {
  const header = `<tr>
    <th style="width:37%;"></th>
    ${[1,2,3,4,5,6,7].map(n => `<th class="rc">${n}</th>`).join('')}
    <th style="width:37%;"></th>
  </tr>`;
  const rows = NARC_ITEMS.map((pair, i) => `
    <tr>
      <td class="lbl-l">${pair[0]}</td>
      ${[1,2,3,4,5,6,7].map(v =>
        `<td class="rc"><input type="radio" name="narc_${i}" value="${v}" required></td>`
      ).join('')}
      <td class="lbl-r">${pair[1]}</td>
    </tr>`
  ).join('');
  return `
    <p>다음에는 사람들이 자신에 대해 갖는 일반적인 태도를 나타내는 문장이 <strong>쌍</strong>으로
    제시되어 있습니다. 양쪽에 위치한 두 문장을 읽고 귀하가 좀 더 동의하는 문장 쪽에 표시해 주십시오.</p>
    <table class="bipolar-table">
      <thead>${header}</thead>
      <tbody>${rows}</tbody>
    </table>`;
}
